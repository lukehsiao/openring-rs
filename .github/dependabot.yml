version: 2
updates:
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "monthly"
      # Wait a week before opening update PRs so a freshly published, possibly
      # compromised release has time to be caught and yanked.
      cooldown:
        default-days: 7
      commit-message:
        prefix: "ci(deps)"
    - package-ecosystem: "cargo"
      directory: "/"
      schedule:
          interval: "monthly"
      cooldown:
        default-days: 7
